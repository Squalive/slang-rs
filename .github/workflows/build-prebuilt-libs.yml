# This is a basic workflow that is manually triggered

name: Build Prebuilt Libs

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:

env:
  SLANG_REPO_URL: https://github.com/shader-slang/slang.git
  SLANG_REPO_BRANCH: master
  SLANG_COMMIT: eb9403ef595a99c2ff6def1d538dbd7a792d9371
  SLANG_BUILD_JOBS: 8
  GCC_TOOLSET_VERSION: 10
  SLANG_CMAKE_TOOLSET: ClangCL

jobs:
  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Linux archives
        run: bash ./sys/slang-builder/build.sh
      - name: Upload Linux archives
        uses: actions/upload-artifact@v4
        with:
          name: slang-lib-x86_64-unknown-linux-gnu
          path: sys/slang/lib/x86_64-unknown-linux-gnu/*

  windows:
    name: Windows x86_64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows archives
        shell: cmd
        run: sys\slang-builder\build.cmd
      - name: Upload Windows archives
        uses: actions/upload-artifact@v4
        with:
          name: slang-lib-x86_64-pc-windows-msvc
          path: sys/slang/lib/x86_64-pc-windows-msvc/*

  macos:
    name: macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS archives
        run: ./sys/slang-builder/build-macos.sh
      - name: Upload macOS archives
        uses: actions/upload-artifact@v4
        with:
          name: slang-lib-aarch64-apple-darwin
          path: sys/slang/lib/aarch64-apple-darwin/*
